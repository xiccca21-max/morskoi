<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#EAE6D7" />
    <meta name="description" content="Морской Бой — PvP-дуэль капитанов на ставку прямо в Telegram." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Морской Бой" />
    <meta property="og:title" content="Морской Бой · Дуэль капитанов" />
    <meta property="og:description" content="PvP-дуэль на ставку прямо в Telegram." />
    <meta property="og:type" content="website" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Морской Бой · Дуэль капитанов</title>
    <style>
      .boot {
        display: flex; height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
        background-color: var(--c-base, #EAE6D7); color: var(--c-main, #000000); font-family: system-ui, sans-serif;
      }
      .boot .mark { width: 56px; height: 56px; border-radius: var(--radius-btn, 0px); background: var(--c-panel, #FFFFFF); border: var(--border-w, 3px) solid var(--c-line, #000000); display: flex; align-items: center; justify-content: center; color: var(--c-muted, #444444); animation: bob 2.4s ease-in-out infinite; box-shadow: var(--shadow-card, 4px 4px 0px #000000); }
      .boot .name { font-size: 18px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600; font-family: 'Oswald', Impact, sans-serif; }
      .boot .sub { font-size: 10px; letter-spacing: 0.22em; color: var(--c-muted, #444444); text-transform: uppercase; }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot">
        <div class="mark">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="2.4"/><path d="M12 7.4V21"/><path d="M5 12H3a9 9 0 0 0 18 0h-2"/><path d="M8 10l4-2 4 2"/>
          </svg>
        </div>
        <div class="name">Морской&nbsp;Бой</div>
        <div class="sub">Загрузка</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

# Прод: один backend+frontend, nginx с HTTPS, SQLite на volume
# Запуск: docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TG_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_PORT: 4000
      DATABASE_URL: file:/data/naval.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_BOT_POLLING: ${TELEGRAM_BOT_POLLING:-false}
      # Прокси-релей для api.telegram.org (если провайдер его блокирует).
      TELEGRAM_API_ROOT: ${TELEGRAM_API_ROOT:-https://api.telegram.org}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PLATFORM_RAKE_PERCENT: ${PLATFORM_RAKE_PERCENT:-5}
      MIN_WAGER: ${MIN_WAGER:-1}
      MAX_WAGER: ${MAX_WAGER:-10000}
      PLACEMENT_TIMEOUT_SEC: ${PLACEMENT_TIMEOUT_SEC:-30}
      TURN_TIMEOUT_SEC: ${TURN_TIMEOUT_SEC:-20}
      MIN_WITHDRAW: ${MIN_WITHDRAW:-100}
      WITHDRAW_FEE_PERCENT: ${WITHDRAW_FEE_PERCENT:-0}
      WITHDRAW_DAILY_LIMIT: ${WITHDRAW_DAILY_LIMIT:-50000}
      REFERRAL_BONUS: ${REFERRAL_BONUS:-25}
      # Платёжка Crypto Pay (@CryptoBot). Пусто = демо-режим.
      CRYPTO_PAY_TOKEN: ${CRYPTO_PAY_TOKEN:-}
      CRYPTO_PAY_API: ${CRYPTO_PAY_API:-https://pay.crypt.bot/api}
      # Ключ для админских действий (обработка выводов)
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    volumes:
      - naval-data:/data
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  naval-data:
